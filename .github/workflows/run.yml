name: Cloud check in action
on:
  push:
    branches:
      - main
  watch:
    types: started
  workflow_dispatch:
  schedule:
    - cron: 35 0 * * *
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: random delay 0-300 seconds
        run: sleep $((RANDOM % 301))
      - name: Check out code
        uses: actions/checkout@main
      - name: Setup Node.js
        uses: actions/setup-node@main
        with:
          node-version: 18
          cache: npm
      - name: Restore cached Cookie
        uses: actions/cache/restore@v4
        with:
          path: .token
          key: ${{ runner.os }}-cache-token
      - name: Create .env file
        run: |
          cat > .env << ENVEOF
          TY_USERNAME_1=18550339991
          TY_PASSWORD_1=sj13673419839
          ENVEOF
      - name: Install dependencies
        run: npm install
      - name: Run
        uses: nick-fields/retry@master
        with:
          timeout_minutes: 30
          max_attempts: 3
          command: npm start
      - name: Save cached Cookie
        uses: actions/cache/save@v4
        with:
          path: .token
          key: ${{ runner.os }}-cache-token-${{ hashFiles('.token/*.json') }}
      - name: Keep Running
        if: github.event_name == 'schedule'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git remote set-url origin https://${{ github.actor }}:${{ github.token }}@github.com/${{ github.repository }}
          git pull --rebase --autostash
          git commit --allow-empty -m "Keep Running..."
          git push
